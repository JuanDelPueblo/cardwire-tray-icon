app-id: me.edyan.cardwiretray
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: cardwire-tray

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  - --own-name=org.kde.*
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --system-talk-name=com.github.opengamingcollective.cardwire

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/cardwire-tray/cargo

modules:
  - name: cardwire-tray
    buildsystem: simple
    build-commands:
      - cargo build --release
      - make install DESTDIR="" PREFIX=/app
    sources:
      - type: dir
        path: .
